<h2 mat-dialog-title>Gerar Convite</h2>
<mat-dialog-content>
  <form [formGroup]="form" id="invite-form" (ngSubmit)="onSubmit()" class="invite-form">
    <mat-form-field appearance="outline">
      <mat-label>Email do convidado</mat-label>
      <input
        matInput
        formControlName="email"
        type="email"
        autocomplete="email"
        placeholder="nome@empresa.com" />
      @if (form.controls.email.hasError('required')) {
        <mat-error>Informe o email</mat-error>
      } @else if (form.controls.email.hasError('email')) {
        <mat-error>Informe um email válido</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="loading()">Cancelar</button>
  <button
    mat-flat-button
    color="primary"
    form="invite-form"
    type="submit"
    [disabled]="form.invalid || loading()">
    @if (loading()) {
      Gerando...
    } @else {
      Gerar e copiar link
    }
  </button>
</mat-dialog-actions>
